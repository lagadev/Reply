<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Auto Reply - Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-deep: #04060f; --bg-card: rgba(12, 18, 45, 0.65); --border-glow: rgba(0, 180, 255, 0.12);
            --neon-blue: #00b4ff; --neon-purple: #8b5cf6; --neon-green: #00e676; --neon-red: #ff3d71;
            --text-primary: #eef2ff; --text-secondary: #7b8ab8; --text-muted: #3e4a6d;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Space Grotesk', sans-serif; background: var(--bg-deep); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; }
        
        /* Background */
        .bg-orb { position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.3; z-index: 0; animation: float 15s infinite alternate; }
        .orb1 { width: 400px; height: 400px; top: -10%; left: -5%; background: var(--neon-blue); }
        .orb2 { width: 350px; height: 350px; bottom: -10%; right: -5%; background: var(--neon-purple); }
        @keyframes float { 0%{transform:translate(0,0)} 100%{transform:translate(30px,-30px)} }

        /* Layout */
        .screen { display: none; position: relative; z-index: 1; min-height: 100vh; padding: 24px; justify-content: center; align-items: center; flex-direction: column; }
        .screen.active { display: flex; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

        /* Card */
        .glass { background: var(--bg-card); backdrop-filter: blur(20px); border: 1px solid var(--border-glow); border-radius: 20px; padding: 35px; width: 100%; max-width: 440px; }
        
        /* Logo */
        .logo { width: 70px; height: 70px; border-radius: 20px; background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple)); display: flex; align-items: center; justify-content: center; font-size: 30px; color: #fff; margin: 0 auto 25px; box-shadow: 0 0 30px rgba(0,180,255,0.4); }
        h1 { text-align: center; font-size: 24px; margin-bottom: 8px; background: linear-gradient(135deg, #fff, var(--neon-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sub { text-align: center; color: var(--text-secondary); font-size: 14px; margin-bottom: 30px; }

        /* Inputs */
        .input-group { margin-bottom: 18px; }
        label { display: block; font-size: 12px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-secondary); margin-bottom: 8px; font-weight: 600; }
        input, textarea { width: 100%; padding: 14px 16px; background: rgba(6,10,25,0.7); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; color: var(--text-primary); font-size: 15px; outline: none; transition: 0.3s; font-family: inherit; }
        input:focus, textarea:focus { border-color: var(--neon-blue); box-shadow: 0 0 0 3px rgba(0,180,255,0.1); }
        textarea { min-height: 100px; resize: vertical; }

        /* Buttons */
        .btn { width: 100%; padding: 14px; border-radius: 50px; font-size: 15px; font-weight: 600; cursor: pointer; border: none; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-primary { background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple)); color: #fff; box-shadow: 0 0 20px rgba(0,180,255,0.3); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(0,180,255,0.5); }
        .btn-danger { background: rgba(255,61,113,0.15); color: var(--neon-red); border: 1px solid rgba(255,61,113,0.2); margin-top: 15px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Status */
        .status { display: flex; align-items: center; gap: 10px; padding: 12px; background: rgba(0,0,0,0.2); border-radius: 12px; margin-bottom: 20px; font-size: 13px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--text-muted); }
        .dot.on { background: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); animation: pulse 2s infinite; }
        @keyframes pulse { 0%{opacity:1} 50%{opacity:0.5} 100%{opacity:1} }

        /* Toggle */
        .toggle-row { display: flex; justify-content: space-between; align-items: center; margin: 20px 0; }
        .toggle { width: 48px; height: 26px; background: rgba(255,255,255,0.1); border-radius: 13px; position: relative; cursor: pointer; transition: 0.3s; }
        .toggle.on { background: var(--neon-blue); }
        .toggle::after { content: ''; position: absolute; width: 20px; height: 20px; background: #fff; border-radius: 50%; top: 3px; left: 3px; transition: 0.3s; }
        .toggle.on::after { transform: translateX(22px); }

        /* Toast */
        .toast { position: fixed; top: 20px; right: 20px; padding: 14px 20px; background: rgba(12,18,45,0.9); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; font-size: 13px; z-index: 9999; animation: slideIn 0.4s; }
        @keyframes slideIn { from{transform:translateX(100px);opacity:0} to{transform:translateX(0);opacity:1} }
    </style>
</head>
<body>
    <div class="bg-orb orb1"></div>
    <div class="bg-orb orb2"></div>

    <!-- Login Screen -->
    <div class="screen active" id="loginScreen">
        <div class="glass">
            <div class="logo"><i class="fa-brands fa-telegram"></i></div>
            <h1>Auto Reply</h1>
            <p class="sub">Enter Telegram username to continue</p>
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="loginUser" placeholder="your_username">
            </div>
            <button class="btn btn-primary" onclick="login()">Continue</button>
        </div>
    </div>

    <!-- Dashboard Screen -->
    <div class="screen" id="dashScreen">
        <div class="glass">
            <div class="status">
                <div class="dot" id="statusDot"></div>
                <span id="statusText">Disconnected</span>
            </div>

            <!-- Connect Form -->
            <div id="connectForm">
                <div class="input-group"><label>API ID</label><input type="text" id="apiId" placeholder="12345678"></div>
                <div class="input-group"><label>API Hash</label><input type="text" id="apiHash" placeholder="abc123..."></div>
                <div class="input-group"><label>Phone Number</label><input type="text" id="phone" placeholder="+880..."></div>
                <button class="btn btn-primary" onclick="sendOtp()">Send OTP</button>
                
                <div id="otpDiv" style="display:none; margin-top:20px;">
                    <div class="input-group"><label>OTP Code</label><input type="text" id="otpCode" placeholder="12345"></div>
                    <div class="input-group"><label>2FA Password (Optional)</label><input type="password" id="password" placeholder="Leave empty"></div>
                    <button class="btn btn-primary" onclick="verifyOtp()">Verify & Connect</button>
                </div>
            </div>

            <!-- Connected View -->
            <div id="connectedView" style="display:none;">
                <div class="toggle-row">
                    <span>Enable Auto Reply</span>
                    <div class="toggle" id="replyToggle" onclick="toggleReply()"></div>
                </div>
                <div class="input-group">
                    <label>Reply Message</label>
                    <textarea id="replyMsg">▶️ আমি এখন ব্যস্ত আছি। একটু পরে রিপ্লাই দিব ✅🥺</textarea>
                </div>
                <button class="btn btn-primary" onclick="saveReply()">Save Settings</button>
                <button class="btn btn-danger" onclick="disconnect()">Disconnect Account</button>
            </div>
        </div>
    </div>

    <script>
        let isConnected = false, isReplying = false;

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function toast(msg) {
            const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg;
            document.body.appendChild(t); setTimeout(() => t.remove(), 3000);
        }

        async function login() {
            const u = document.getElementById('loginUser').value.trim();
            if(!u) return toast('Enter username');
            const res = await fetch('/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username: u}) });
            if(res.ok) { showScreen('dashScreen'); checkStatus(); }
        }

        async function sendOtp() {
            const data = { api_id: document.getElementById('apiId').value, api_hash: document.getElementById('apiHash').value, phone_number: document.getElementById('phone').value };
            const res = await fetch('/send-otp', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
            const json = await res.json();
            if(json.success) { document.getElementById('otpDiv').style.display = 'block'; toast('OTP Sent!'); }
            else toast(json.error || 'Error');
        }

        async function verifyOtp() {
            const data = { code: document.getElementById('otpCode').value, password: document.getElementById('password').value };
            const res = await fetch('/verify-otp', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
            const json = await res.json();
            if(json.success) { isConnected = true; updateUI(); toast('Connected!'); }
            else toast(json.error || 'Error');
        }

        async function toggleReply() {
            isReplying = !isReplying;
            const res = await fetch('/toggle-reply', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({enabled: isReplying}) });
            updateUI();
        }

        async function saveReply() {
            const msg = document.getElementById('replyMsg').value;
            await fetch('/save-reply', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({message: msg}) });
            toast('Saved!');
        }

        async function disconnect() {
            await fetch('/disconnect', { method: 'POST' });
            isConnected = false; isReplying = false;
            document.getElementById('otpDiv').style.display = 'none';
            updateUI();
        }

        function updateUI() {
            document.getElementById('connectForm').style.display = isConnected ? 'none' : 'block';
            document.getElementById('connectedView').style.display = isConnected ? 'block' : 'none';
            document.getElementById('statusDot').className = isConnected ? 'dot on' : 'dot';
            document.getElementById('statusText').innerText = isConnected ? (isReplying ? 'Auto Reply Active' : 'Connected') : 'Disconnected';
            document.getElementById('replyToggle').className = isReplying ? 'toggle on' : 'toggle';
        }

        async function checkStatus() {
            const res = await fetch('/status'); const data = await res.json();
            if(data.logged_in) { isConnected = data.connected; isReplying = data.auto_reply_enabled; updateUI(); }
        }
    </script>
</body>
</html>
